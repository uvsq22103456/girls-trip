<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Méta-tags magiques pour l'effet "Vraie App iOS" -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SummerTrip">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192/FFB6C1/FFFFFF?text=💖"> <!-- Remplace par l'URL de ton icône -->
  <link rel="manifest" href="manifest.json">
  
  <title>Summer Trip 🌴</title>
  
  <!-- Importation des modules Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Ta configuration Firebase qui fonctionne ✨
    const firebaseConfig = {
      apiKey: "AIzaSyBMSX0_KYX8EXtVBNGGb3Z687TcsQrD7WY",
      authDomain: "ramadan-7ef9d.firebaseapp.com",
      projectId: "ramadan-7ef9d",
      storageBucket: "ramadan-7ef9d.firebasestorage.app",
      messagingSenderId: "1054040681487",
      appId: "1:1054040681487:web:ecb8ee77b3d8205e78877a",
      measurementId: "G-8HW90MFPKK"
    };

    // Initialisation
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Liste des filles 
    // Liste des filles 
    const users = ["Moi", "Samia", "Enora", "Anaïs"];;
    
    // --- LOGIQUE DE L'APP ---
    const expensesCol = collection(db, "expenses");
    let allExpenses = [];

    // Écouter les données en temps réel
    const q = query(expensesCol, orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
      allExpenses = [];
      snapshot.forEach((doc) => {
        allExpenses.push({ id: doc.id, ...doc.data() });
      });
      updateUI();
    });

    // Ajouter une dépense
    window.addExpense = async function(e) {
      e.preventDefault();
      const payer = document.getElementById("payer").value;
      const amount = parseFloat(document.getElementById("amount").value);
      const description = document.getElementById("description").value;

      if (!payer || !amount || !description) return alert("Remplis tout bestie !");

      await addDoc(expensesCol, {
        payer: payer,
        amount: amount,
        description: description,
        timestamp: new Date()
      });

      document.getElementById("expenseForm").reset();
      switchTab('dashboard');
    };

    // Mettre à jour l'affichage et les calculs
    function updateUI() {
      const totalBudget = allExpenses.reduce((acc, curr) => acc + curr.amount, 0);
      document.getElementById("totalBudget").innerText = totalBudget.toFixed(2) + " €";

      const historyDiv = document.getElementById("historyList");
      historyDiv.innerHTML = allExpenses.map(ex => `
        <div class="card expense-card">
          <div class="expense-info">
            <strong>${ex.description}</strong>
            <span class="payer-badge">Payé par ${ex.payer}</span>
          </div>
          <div class="expense-amount">${ex.amount.toFixed(2)} €</div>
        </div>
      `).join('');

      calculateBalances(totalBudget);
    }

    function calculateBalances(total) {
      const perPerson = total / users.length;
      document.getElementById("perPerson").innerText = perPerson.toFixed(2) + " €";

      let balances = {};
      users.forEach(u => balances[u] = 0);

      allExpenses.forEach(ex => {
        balances[ex.payer] += ex.amount;
      });
      users.forEach(u => {
        balances[u] -= perPerson;
      });

      let debtors = [];
      let creditors = [];
      for (const [user, balance] of Object.entries(balances)) {
        if (balance < -0.01) debtors.push({ user, amount: Math.abs(balance) });
        else if (balance > 0.01) creditors.push({ user, amount: balance });
      }

      let debtsHTML = "";
      let i = 0, j = 0;
      while (i < debtors.length && j < creditors.length) {
        let debtor = debtors[i];
        let creditor = creditors[j];
        let amount = Math.min(debtor.amount, creditor.amount);

        debtsHTML += `<div class="card debt-card">💸 <strong>${debtor.user}</strong> doit <strong>${amount.toFixed(2)} €</strong> à <strong>${creditor.user}</strong></div>`;

        debtor.amount -= amount;
        creditor.amount -= amount;

        if (debtor.amount < 0.01) i++;
        if (creditor.amount < 0.01) j++;
      }

      document.getElementById("debtsList").innerHTML = debtsHTML || "<p style='text-align:center;'>Tout le monde est à jour ! ✨</p>";
    }

    // Gestion des onglets
    window.switchTab = function(tabId) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
    };
  </script>

  <style>
    /* VARIABLES THEME GIRLY SUMMER */
    :root {
      --bg: #FFF5F7; /* Rose très pâle */
      --primary: #FF7B9C; /* Rose chaud */
      --accent: #FFC0CB; /* Pink */
      --text: #4A4A4A;
      --card-bg: #FFFFFF;
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --safe-top: env(safe-area-inset-top, 40px);
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    body {
      margin: 0; padding: 0;
      background-color: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      padding-top: var(--safe-top);
      padding-bottom: calc(80px + var(--safe-bottom));
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
    }

    .container { padding: 0 20px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(255, 123, 156, 0.1);
    }

    .budget-hero {
      text-align: center;
      background: linear-gradient(135deg, #FF7B9C, #FFB2B2);
      color: white;
    }
    .budget-hero h2 { margin: 0; font-size: 36px; }
    .budget-hero p { margin: 5px 0 0; opacity: 0.9; }

    .expense-card { display: flex; justify-content: space-between; align-items: center; }
    .expense-info strong { display: block; font-size: 16px; margin-bottom: 5px; }
    .payer-badge { background: var(--bg); color: var(--primary); padding: 4px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
    .expense-amount { font-size: 18px; font-weight: 800; color: var(--primary); }

    .debt-card { text-align: center; font-size: 16px; }

    /* FORMULAIRE */
    input, select, button {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border: none;
      border-radius: 15px;
      background: var(--bg);
      font-size: 16px;
      color: var(--text);
      outline: none;
    }
    button {
      background: var(--primary);
      color: white;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(255, 123, 156, 0.3);
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.98); }

    /* BARRE DE NAVIGATION IOS (BOTTOM) */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 15px 0 calc(15px + var(--safe-bottom));
      border-top: 1px solid rgba(0,0,0,0.05);
    }
    .nav-item {
      text-align: center;
      color: #A0A0A0;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

  <header>🌴 Summer Trip</header>

  <div class="container">
    <!-- ONGLET 1 : RÉSUMÉ -->
    <div id="dashboard" class="tab-content active">
      <div class="card budget-hero">
        <p>Budget Global</p>
        <h2 id="totalBudget">0.00 €</h2>
        <p>Soit <b id="perPerson">0.00 €</b> par personne</p>
      </div>
      <h3 style="color: var(--primary);">Dernières dépenses</h3>
      <div id="historyList">Chargement...</div>
    </div>

    <!-- ONGLET 2 : AJOUTER -->
    <div id="add" class="tab-content">
      <div class="card">
        <h3 style="margin-top:0; color: var(--primary);">Nouvelle Dépense 💸</h3>
        <form id="expenseForm" onsubmit="addExpense(event)">
         <select id="payer" required>
            <option value="" disabled selected>Qui a payé ?</option>
            <option value="Moi">Moi</option>
            <option value="Samia">Samia</option>
            <option value="Enora">Enora</option>
            <option value="Anaïs">Anaïs</option>
          </select>
          <input type="text" id="description" placeholder="Ex: Plein d'essence, Cocktail..." required>
          <input type="number" id="amount" placeholder="Montant (€)" step="0.01" required>
          <button type="submit">Valider</button>
        </form>
      </div>
    </div>

    <!-- ONGLET 3 : QUI DOIT QUOI -->
    <div id="balances" class="tab-content">
      <h3 style="color: var(--primary); text-align:center;">On fait les comptes ⚖️</h3>
      <div id="debtsList"></div>
    </div>
  </div>

  <!-- NAVIGATION -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('dashboard')">
      <span class="nav-icon">📊</span>
      Résumé
    </div>
    <div class="nav-item" onclick="switchTab('add')">
      <span class="nav-icon">✨</span>
      Ajouter
    </div>
    <div class="nav-item" onclick="switchTab('balances')">
      <span class="nav-icon">💰</span>
      Comptes
    </div>
  </nav>

</body>
</html>
