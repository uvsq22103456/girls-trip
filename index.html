<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SummerTrip">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192/FFB6C1/FFFFFF?text=💖">
  <link rel="manifest" href="manifest.json">
  
  <title>Summer Trip 🌴</title>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    // Ajout de updateDoc pour pouvoir cocher la liste de courses
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, doc as firestoreDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMSX0_KYX8EXtVBNGGb3Z687TcsQrD7WY",
      authDomain: "ramadan-7ef9d.firebaseapp.com",
      projectId: "ramadan-7ef9d",
      storageBucket: "ramadan-7ef9d.firebasestorage.app",
      messagingSenderId: "1054040681487",
      appId: "1:1054040681487:web:ecb8ee77b3d8205e78877a",
      measurementId: "G-8HW90MFPKK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const users = ["Samia", "Enora", "Anaïs"];
    
    // Les 3 collections de la base de données
    const expensesCol = collection(db, "expenses");
    const ideasCol = collection(db, "ideas");
    const shoppingCol = collection(db, "shopping");

    let allExpenses = [];
    let allIdeas = [];
    let allShopping = [];
    let currentUser = localStorage.getItem('summerTripUser');

    window.onload = () => {
      if (!currentUser) {
        document.getElementById('loginScreen').style.display = 'flex';
      } else {
        document.getElementById('welcomeMessage').innerText = `Hello ${currentUser} ✨`;
        document.getElementById('payer').value = currentUser;
      }
    };

    window.login = function(name) {
      currentUser = name;
      localStorage.setItem('summerTripUser', name);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('welcomeMessage').innerText = `Hello ${currentUser} ✨`;
      document.getElementById('payer').value = currentUser;
      updateUI();
    };

    window.logout = function() {
      localStorage.removeItem('summerTripUser');
      location.reload();
    };

    // --- ECOUTEURS FIREBASE ---

    // 1. Dépenses
    onSnapshot(query(expensesCol, orderBy("timestamp", "desc")), (snapshot) => {
      allExpenses = [];
      snapshot.forEach((d) => allExpenses.push({ id: d.id, ...d.data() }));
      if(currentUser) updateUI();
    });

    // 2. Bons Plans
    onSnapshot(query(ideasCol, orderBy("timestamp", "desc")), (snapshot) => {
      allIdeas = [];
      snapshot.forEach((d) => allIdeas.push({ id: d.id, ...d.data() }));
      if(currentUser) updateIdeasUI();
    });

    // 3. Liste de courses
    onSnapshot(query(shoppingCol, orderBy("timestamp", "asc")), (snapshot) => {
      allShopping = [];
      snapshot.forEach((d) => allShopping.push({ id: d.id, ...d.data() }));
      if(currentUser) updateShoppingUI();
    });


    // --- FONCTIONS DEPENSES ---
    window.addExpense = async function(e) {
      e.preventDefault();
      const payer = document.getElementById("payer").value;
      const amount = parseFloat(document.getElementById("amount").value);
      const description = document.getElementById("description").value;

      if (!payer || !amount || !description) return alert("Remplis tout bestie !");

      const btn = document.getElementById("submitBtn");
      btn.innerText = "Ajout... ⏳"; btn.style.opacity = "0.7";

      await addDoc(expensesCol, { payer, amount, description, timestamp: new Date() });

      document.getElementById("expenseForm").reset();
      document.getElementById("payer").value = currentUser; 
      btn.innerText = "Valider"; btn.style.opacity = "1";
      switchTab('dashboard');
    };

    window.deleteExpense = async function(id) {
      if(confirm("Tu veux vraiment supprimer cette dépense ? 🗑️")) {
        try { await deleteDoc(firestoreDoc(db, "expenses", id)); } 
        catch (error) { alert("Erreur : " + error.message); }
      }
    };


    // --- FONCTIONS BONS PLANS ---
    window.addIdea = async function(e) {
      e.preventDefault();
      const title = document.getElementById("ideaTitle").value;
      const price = document.getElementById("ideaPrice").value;
      let link = document.getElementById("ideaLink").value;

      // S'assurer que le lien s'ouvre bien s'il n'y a pas "http"
      if(link && !link.startsWith("http")) link = "https://" + link;

      const btn = document.getElementById("submitIdeaBtn");
      btn.innerText = "Ajout... ⏳"; btn.style.opacity = "0.7";

      await addDoc(ideasCol, { title, price, link, addedBy: currentUser, timestamp: new Date() });

      document.getElementById("ideaForm").reset();
      btn.innerText = "Ajouter l'idée 💡"; btn.style.opacity = "1";
    };

    window.deleteIdea = async function(id) {
      if(confirm("Supprimer ce bon plan ? 🗑️")) {
        await deleteDoc(firestoreDoc(db, "ideas", id));
      }
    };


    // --- FONCTIONS LISTE DE COURSES ---
    window.addShoppingItem = async function(e) {
      e.preventDefault();
      const item = document.getElementById("shoppingItem").value;
      if (!item) return;

      await addDoc(shoppingCol, { item, done: false, timestamp: new Date() });
      document.getElementById("shoppingForm").reset();
    };

    window.toggleShoppingItem = async function(id, isDone) {
      await updateDoc(firestoreDoc(db, "shopping", id), { done: !isDone });
    };

    window.deleteShoppingItem = async function(id) {
      await deleteDoc(firestoreDoc(db, "shopping", id));
    };


    // --- MISES A JOUR INTERFACE ---

    function updateUI() {
      const totalBudget = allExpenses.reduce((acc, curr) => acc + curr.amount, 0);
      document.getElementById("totalBudget").innerText = totalBudget.toFixed(2) + " €";

      const historyDiv = document.getElementById("historyList");
      historyDiv.innerHTML = allExpenses.map(ex => `
        <div class="card expense-card">
          <div class="expense-info">
            <strong>${ex.description}</strong>
            <span class="payer-badge" style="background: ${ex.payer === currentUser ? 'var(--primary)' : 'var(--bg)'}; color: ${ex.payer === currentUser ? 'white' : 'var(--primary)'}">
              Payé par ${ex.payer === currentUser ? 'Toi' : ex.payer}
            </span>
          </div>
          <div class="expense-actions">
            <div class="expense-amount">${ex.amount.toFixed(2)} €</div>
            <button class="delete-btn" onclick="deleteExpense('${ex.id}')">🗑️</button>
          </div>
        </div>
      `).join('');

      calculateBalances(totalBudget);
    }

    function updateIdeasUI() {
      const ideasDiv = document.getElementById("ideasList");
      if(allIdeas.length === 0) {
        ideasDiv.innerHTML = "<p style='text-align:center; color:#A0A0A0;'>Pas encore de bons plans ajoutés.</p>";
        return;
      }

      ideasDiv.innerHTML = allIdeas.map(idea => `
        <div class="card idea-card">
          <div class="idea-header">
            <strong>${idea.title}</strong>
            <button class="delete-btn" onclick="deleteIdea('${idea.id}')">🗑️</button>
          </div>
          <div class="idea-details">
            <span class="price-tag">${idea.price}</span>
            <span class="added-by">Proposé par ${idea.addedBy}</span>
          </div>
          ${idea.link ? `<a href="${idea.link}" target="_blank" class="idea-link">Voir le lien 🔗</a>` : ''}
        </div>
      `).join('');
    }

    function updateShoppingUI() {
      const shoppingDiv = document.getElementById("shoppingList");
      if(allShopping.length === 0) {
        shoppingDiv.innerHTML = "<p style='text-align:center; color:#A0A0A0;'>La liste est vide.</p>";
        return;
      }

      shoppingDiv.innerHTML = allShopping.map(shop => `
        <div class="shopping-item ${shop.done ? 'done' : ''}">
          <label class="shopping-label">
            <input type="checkbox" ${shop.done ? 'checked' : ''} onchange="toggleShoppingItem('${shop.id}', ${shop.done})">
            <span>${shop.item}</span>
          </label>
          <button class="delete-btn-small" onclick="deleteShoppingItem('${shop.id}')">❌</button>
        </div>
      `).join('');
    }

    function calculateBalances(total) {
      const perPerson = total / users.length;
      document.getElementById("perPerson").innerText = perPerson.toFixed(2) + " €";

      let balances = {};
      users.forEach(u => balances[u] = 0);

      allExpenses.forEach(ex => { balances[ex.payer] += ex.amount; });
      users.forEach(u => { balances[u] -= perPerson; });

      let debtors = [];
      let creditors = [];
      for (const [user, balance] of Object.entries(balances)) {
        if (balance < -0.01) debtors.push({ user, amount: Math.abs(balance) });
        else if (balance > 0.01) creditors.push({ user, amount: balance });
      }

      let debtsHTML = "";
      let i = 0, j = 0;
      while (i < debtors.length && j < creditors.length) {
        let debtor = debtors[i];
        let creditor = creditors[j];
        let amount = Math.min(debtor.amount, creditor.amount);

        let isMe = (debtor.user === currentUser || creditor.user === currentUser);
        let cardStyle = isMe ? "border: 2px solid var(--primary); background: #FFF0F3;" : "";
        let text = `<strong>${debtor.user === currentUser ? 'Tu' : debtor.user}</strong> doit <strong>${amount.toFixed(2)} €</strong> à <strong>${creditor.user === currentUser ? 'Toi' : creditor.user}</strong>`;

        debtsHTML += `<div class="card debt-card" style="${cardStyle}">💸 ${text}</div>`;

        debtor.amount -= amount; creditor.amount -= amount;
        if (debtor.amount < 0.01) i++;
        if (creditor.amount < 0.01) j++;
      }

      document.getElementById("debtsList").innerHTML = debtsHTML || "<p style='text-align:center;'>Tout le monde est à jour ! ✨</p>";
    }

    window.switchTab = function(tabId) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
    };
  </script>

  <style>
    :root {
      --bg: #FFF5F7;
      --primary: #FF7B9C;
      --accent: #FFC0CB;
      --text: #4A4A4A;
      --card-bg: #FFFFFF;
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --safe-top: env(safe-area-inset-top, 40px);
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    body {
      margin: 0; padding: 0;
      background-color: var(--bg); color: var(--text);
      -webkit-tap-highlight-color: transparent;
      padding-top: var(--safe-top); padding-bottom: calc(90px + var(--safe-bottom));
    }

    .login-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #FFF5F7, #FFC0CB);
      z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
    }
    .login-overlay h1 { color: var(--primary); font-size: 32px; margin-bottom: 10px; }
    .login-overlay p { color: var(--text); margin-bottom: 30px; font-weight: 500; }
    .user-btn {
      background: white; border: 2px solid var(--primary); color: var(--primary);
      width: 80%; padding: 15px; margin-bottom: 15px; border-radius: 20px; font-size: 18px; font-weight: bold;
      box-shadow: 0 4px 10px rgba(255, 123, 156, 0.2);
    }
    .user-btn:active { background: var(--primary); color: white; }

    header { display: flex; justify-content: space-between; align-items: center; padding: 20px; font-size: 24px; font-weight: 800; color: var(--primary); }
    .logout-btn { font-size: 12px; background: var(--bg); color: var(--primary); padding: 5px 10px; border-radius: 10px; border: none; cursor: pointer; }

    .container { padding: 0 20px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(255, 123, 156, 0.1); }
    
    .budget-hero { text-align: center; background: linear-gradient(135deg, #FF7B9C, #FFB2B2); color: white; }
    .budget-hero h2 { margin: 0; font-size: 36px; }
    .budget-hero p { margin: 5px 0 0; opacity: 0.9; }

    .expense-card { display: flex; justify-content: space-between; align-items: center; }
    .expense-info strong { display: block; font-size: 16px; margin-bottom: 5px; }
    .payer-badge { padding: 4px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
    
    .expense-actions { display: flex; align-items: center; gap: 10px; }
    .expense-amount { font-size: 18px; font-weight: 800; color: var(--primary); }
    .delete-btn { background: none; border: none; font-size: 18px; color: #ff4d4d; padding: 5px; margin: 0; cursor: pointer; }
    .delete-btn-small { background: none; border: none; font-size: 14px; color: #ff4d4d; padding: 5px; cursor: pointer; }
    
    .debt-card { text-align: center; font-size: 16px; }

    /* STYLES PLANNING & COURSES */
    .section-title { color: var(--primary); font-size: 20px; margin: 25px 0 15px; border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 5px; }
    
    .idea-card { padding: 15px; }
    .idea-header { display: flex; justify-content: space-between; align-items: center; font-size: 18px; margin-bottom: 5px; }
    .idea-details { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; color: #777; }
    .price-tag { background: #FFF0F3; color: var(--primary); padding: 3px 8px; border-radius: 8px; font-weight: bold; }
    .idea-link { display: inline-block; width: 100%; text-align: center; background: var(--bg); color: var(--primary); padding: 10px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; }
    
    .shopping-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-label { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; font-size: 16px; }
    .shopping-item.done span { text-decoration: line-through; color: #aaa; }
    .shopping-form-group { display: flex; gap: 10px; }
    .shopping-form-group input { margin-bottom: 0; flex: 1; }
    .shopping-form-group button { width: auto; margin-bottom: 0; padding: 0 20px; }

    input, select, button.action-btn { width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-radius: 15px; background: var(--bg); font-size: 16px; color: var(--text); outline: none; }
    button.action-btn { background: var(--primary); color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 123, 156, 0.3); transition: transform 0.1s; cursor: pointer; }
    button.action-btn:active { transform: scale(0.98); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; justify-content: space-around;
      padding: 10px 0 calc(10px + var(--safe-bottom)); border-top: 1px solid rgba(0,0,0,0.05);
    }
    .nav-item { flex: 1; text-align: center; color: #A0A0A0; font-size: 11px; font-weight: 600; cursor: pointer; }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div id="loginScreen" class="login-overlay">
    <h1>Summer Trip 🌴</h1>
    <p>Qui es-tu ?</p>
    <button class="user-btn" onclick="login('Samia')">Samia</button>
    <button class="user-btn" onclick="login('Enora')">Enora</button>
    <button class="user-btn" onclick="login('Anaïs')">Anaïs</button>
  </div>

  <header>
    <span id="welcomeMessage">Summer Trip 🌴</span>
    <button class="logout-btn" onclick="logout()">Changer profil</button>
  </header>

  <div class="container">
    
    <!-- ONGLET 1 : RESUME -->
    <div id="dashboard" class="tab-content active">
      <div class="card budget-hero">
        <p>Budget Global</p>
        <h2 id="totalBudget">0.00 €</h2>
        <p>Soit <b id="perPerson">0.00 €</b> par personne</p>
      </div>
      <h3 style="color: var(--primary);">Dernières dépenses</h3>
      <div id="historyList">Chargement...</div>
    </div>

    <!-- ONGLET 2 : AJOUTER DEPENSE -->
    <div id="add" class="tab-content">
      <div class="card">
        <h3 style="margin-top:0; color: var(--primary);">Nouvelle Dépense 💸</h3>
        <form id="expenseForm" onsubmit="addExpense(event)">
          <select id="payer" required>
            <option value="Samia">Samia</option>
            <option value="Enora">Enora</option>
            <option value="Anaïs">Anaïs</option>
          </select>
          <input type="text" id="description" placeholder="Ex: Plein d'essence, Cocktail..." required>
          <input type="number" id="amount" placeholder="Montant (€)" step="0.01" required>
          <button type="submit" id="submitBtn" class="action-btn">Valider</button>
        </form>
      </div>
    </div>

    <!-- ONGLET 3 : COMPTES -->
    <div id="balances" class="tab-content">
      <h3 style="color: var(--primary); text-align:center;">On fait les comptes ⚖️</h3>
      <div id="debtsList"></div>
    </div>

    <!-- ONGLET 4 : PLANNING & COURSES -->
    <div id="planning" class="tab-content">
      
      <h3 class="section-title">Bons Plans & Activités 📍</h3>
      <div class="card">
        <form id="ideaForm" onsubmit="addIdea(event)">
          <input type="text" id="ideaTitle" placeholder="Ex: Resto vue mer, Jet Ski..." required>
          <select id="ideaPrice" required>
            <option value="" disabled selected>Tranche de prix ?</option>
            <option value="Gratuit ✨">Gratuit ✨</option>
            <option value="Pas cher 💸">Pas cher 💸</option>
            <option value="Moyen 💰">Moyen 💰</option>
            <option value="Cher 💎">Cher 💎</option>
          </select>
          <input type="url" id="ideaLink" placeholder="Lien Insta, TikTok, Maps (optionnel)">
          <button type="submit" id="submitIdeaBtn" class="action-btn">Ajouter l'idée 💡</button>
        </form>
      </div>
      <div id="ideasList"></div>

      <h3 class="section-title">Liste de courses 🛒</h3>
      <div class="card">
        <form id="shoppingForm" onsubmit="addShoppingItem(event)" class="shopping-form-group">
          <input type="text" id="shoppingItem" placeholder="Ex: Bouteilles d'eau, Chips..." required>
          <button type="submit" class="action-btn">➕</button>
        </form>
        <div id="shoppingList" style="margin-top: 15px;"></div>
      </div>

    </div>

  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('dashboard')">
      <span class="nav-icon">📊</span> Résumé
    </div>
    <div class="nav-item" onclick="switchTab('planning')">
      <span class="nav-icon">🗓️</span> Planning
    </div>
    <div class="nav-item" onclick="switchTab('add')">
      <span class="nav-icon">✨</span> Ajouter
    </div>
    <div class="nav-item" onclick="switchTab('balances')">
      <span class="nav-icon">💰</span> Comptes
    </div>
  </nav>

</body>
</html>
